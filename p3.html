<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Summer of the Beautiful White Horse — Fill in the Blank</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page-header {
    max-width: 640px;
    margin: 0 auto 2rem;
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: 4px;
  }

  .page-header p {
    font-size: 14px;
    color: #6b6b65;
  }

  .game-wrap {
    max-width: 640px;
    margin: 0 auto;
    font-family: inherit;
  }

  .progress-bar-bg {
    height: 6px;
    background: #e2e0d8;
    border-radius: 99px;
    margin-bottom: 1.5rem;
  }

  .progress-bar-fill {
    height: 6px;
    background: #1D9E75;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .q-card {
    background: #ffffff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 12px;
    padding: 1.5rem 1.25rem;
    margin-bottom: 1rem;
  }

  .q-meta {
    font-size: 12px;
    color: #9a9990;
    margin-bottom: 0.5rem;
    letter-spacing: 0.04em;
  }

  .q-sentence {
    font-size: 17px;
    color: #1a1a18;
    line-height: 1.7;
    margin-bottom: 1.25rem;
  }

  .blank {
    display: inline-block;
    min-width: 100px;
    border-bottom: 2px solid #1D9E75;
    color: #0F6E56;
    font-weight: 500;
    text-align: center;
    padding: 0 4px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .opt-btn {
    background: #f5f4f0;
    border: 0.5px solid rgba(0,0,0,0.18);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 15px;
    color: #1a1a18;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }

  .opt-btn:hover:not(:disabled) {
    background: #eceae4;
    border-color: rgba(0,0,0,0.28);
  }

  .opt-btn.correct {
    background: #E1F5EE;
    border-color: #1D9E75;
    color: #085041;
    font-weight: 500;
  }

  .opt-btn.wrong {
    background: #FCEBEB;
    border-color: #A32D2D;
    color: #501313;
  }

  .opt-btn:disabled { cursor: default; }

  .hint-box {
    background: #f5f4f0;
    border-left: 3px solid #1D9E75;
    padding: 0.75rem 1rem;
    font-size: 14px;
    color: #4a4a46;
    margin-top: 1rem;
    display: none;
    line-height: 1.6;
  }

  .feedback {
    font-size: 14px;
    margin-top: 1rem;
    font-weight: 500;
    min-height: 22px;
  }

  .feedback.ok { color: #0F6E56; }
  .feedback.err { color: #993C1D; }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.25rem;
  }

  .nav-btn {
    background: transparent;
    border: 0.5px solid rgba(0,0,0,0.22);
    border-radius: 8px;
    padding: 0.5rem 1.1rem;
    font-size: 14px;
    color: #1a1a18;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: background 0.15s;
  }

  .nav-btn:hover:not(:disabled) { background: #eceae4; }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }

  .score-chip {
    font-size: 13px;
    color: #6b6b65;
  }

  .result-card {
    background: #ffffff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 12px;
    padding: 2.5rem 1.5rem;
    text-align: center;
  }

  .result-score {
    font-size: 52px;
    font-weight: 500;
    color: #0F6E56;
    margin: 0.5rem 0;
  }

  .result-label {
    font-size: 15px;
    color: #6b6b65;
    margin-bottom: 1.5rem;
  }

  .result-msg {
    font-size: 16px;
    color: #1a1a18;
    margin-bottom: 1.75rem;
    line-height: 1.6;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .restart-btn {
    background: transparent;
    border: 0.5px solid rgba(0,0,0,0.28);
    border-radius: 8px;
    padding: 0.65rem 1.5rem;
    font-size: 15px;
    color: #1a1a18;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }

  .restart-btn:hover { background: #eceae4; }

  .hint-toggle {
    background: none;
    border: none;
    font-size: 13px;
    color: #0F6E56;
    cursor: pointer;
    padding: 0;
    margin-top: 0.75rem;
    text-decoration: underline;
    text-underline-offset: 3px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
    body { padding: 1rem 0.75rem; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>The Summer of the Beautiful White Horse</h1>
  <p>Class 11 · Fill in the Blank · William Saroyan</p>
</div>

<div class="game-wrap">
  <div id="quiz-area"></div>
</div>

<script>
const questions = [
  {
    before: "Aram says the Garoghlanian family was known for its",
    blank: "honesty",
    after: "above everything else, even its poverty.",
    options: ["honesty", "courage", "pride", "generosity"],
    hint: "The story opens by emphasising this quality as the defining trait of the whole tribe — more important even than wealth."
  },
  {
    before: "Mourad was considered the",
    blank: "crazy",
    after: "one of the family, just as his uncle Khosrove was.",
    options: ["crazy", "bravest", "wisest", "eldest"],
    hint: "A particular kind of wildness and impulsiveness ran in that branch of the family — Mourad inherited it from a famous uncle."
  },
  {
    before: "Mourad knocked on Aram's window",
    blank: "one morning",
    after: "before daybreak.",
    options: ["one morning", "at midnight", "after school", "one evening"],
    hint: "The story begins at a specific and unusual hour — when the world is still dark and the two cousins could ride without being seen."
  },
  {
    before: "Aram justified keeping the horse by telling himself that stealing a horse for the sake of",
    blank: "riding",
    after: "it was not the same as stealing other things.",
    options: ["riding", "selling", "racing", "hiding"],
    hint: "Aram attempts a clever distinction in his mind — the purpose behind taking the horse made it feel less like theft."
  },
  {
    before: "When Aram tried to ride alone, the horse threw him into a",
    blank: "vineyard",
    after: ".",
    options: ["vineyard", "ditch", "river", "barn"],
    hint: "The landscape around Fresno is agricultural — think of what crop is famously grown in that California valley."
  },
  {
    before: "John Byro, the farmer who owned the horse, had bought it for",
    blank: "sixty dollars",
    after: ".",
    options: ["sixty dollars", "twenty pounds", "a hundred dollars", "two gold coins"],
    hint: "Byro mentions the exact price he paid, which underscores how much he values the animal and how significant its loss has been."
  },
  {
    before: "When John Byro met the boys with the horse, he said it was the",
    blank: "twin",
    after: "of his lost horse.",
    options: ["twin", "brother", "image", "double"],
    hint: "Byro uses a specific word suggesting the horse and his lost one could have come from the same birth — yet he chooses not to accuse the boys."
  },
  {
    before: "Mourad returned the horse before",
    blank: "sunrise",
    after: "so no one would see them.",
    options: ["sunrise", "noon", "evening", "midnight"],
    hint: "Just as they had taken the horse in the dark, the boys returned it at the same quiet, hidden hour."
  },
  {
    before: "After the horse was returned, John Byro's dog",
    blank: "wagged its tail",
    after: ", suggesting the horse was genuinely his.",
    options: ["wagged its tail", "barked loudly", "ran away", "sniffed Mourad"],
    hint: "The dog's natural reaction confirmed the truth — animals don't lie, and this small detail sealed the moment."
  },
  {
    before: "The theme of the story is that",
    blank: "honesty",
    after: "eventually triumphs, even in the young.",
    options: ["honesty", "adventure", "friendship", "poverty"],
    hint: "The story came full circle — Aram's very first claim about his family turned out to be the story's moral lesson as well."
  }
];

let current = 0;
let score = 0;
let answered = [];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function render() {
  const area = document.getElementById('quiz-area');
  if (current >= questions.length) {
    renderResult(area);
    return;
  }
  const q = questions[current];
  const shuffled = shuffle(q.options);
  const pct = (current / questions.length) * 100;
  const ans = answered[current];

  area.innerHTML = `
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="q-card">
      <div class="q-meta">Question ${current + 1} of ${questions.length}</div>
      <div class="q-sentence">${q.before} <span class="blank">${ans ? ans.chosen : '________'}</span> ${q.after}</div>
      <div class="options-grid">
        ${shuffled.map(opt => `
          <button class="opt-btn${ans ? (opt === q.blank ? ' correct' : (opt === ans.chosen && opt !== q.blank ? ' wrong' : '')) : ''}"
            onclick="choose('${opt.replace(/'/g, "\\'")}')" ${ans ? 'disabled' : ''}>
            ${opt}
          </button>
        `).join('')}
      </div>
      <div class="feedback ${ans ? (ans.correct ? 'ok' : 'err') : ''}">
        ${ans ? (ans.correct ? '✓ Correct!' : `✗ The correct word is: "${q.blank}"`) : ''}
      </div>
      <button class="hint-toggle" onclick="toggleHint()">
        <i class="ti ti-bulb" aria-hidden="true"></i>
        ${ans ? 'Show explanation' : 'Show hint'}
      </button>
      <div class="hint-box" id="hint-box">${q.hint}</div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="go(-1)" ${current === 0 ? 'disabled' : ''}>
        <i class="ti ti-arrow-left" aria-hidden="true"></i> Previous
      </button>
      <span class="score-chip">Score: ${score} / ${questions.length}</span>
      <button class="nav-btn" onclick="go(1)" ${!ans ? 'disabled' : ''}>
        ${current === questions.length - 1 ? 'See results' : 'Next'} <i class="ti ti-arrow-right" aria-hidden="true"></i>
      </button>
    </div>
  `;
}

function choose(opt) {
  if (answered[current]) return;
  const q = questions[current];
  const correct = opt === q.blank;
  if (correct) score++;
  answered[current] = { chosen: opt, correct };
  render();
}

function go(dir) {
  current += dir;
  if (current < 0) current = 0;
  render();
}

function toggleHint() {
  const box = document.getElementById('hint-box');
  if (!box) return;
  box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

function renderResult(area) {
  const pct = Math.round((score / questions.length) * 100);
  let msg = '';
  if (pct >= 90) msg = 'Excellent! You have a thorough grasp of the story. Aram and Mourad would be proud.';
  else if (pct >= 70) msg = 'Good work! You know the story well. A quick re-read of the key passages will make you even sharper.';
  else if (pct >= 50) msg = 'A decent start! Review the story\'s language and themes — focus on honesty and family values.';
  else msg = 'Keep at it! Reading Saroyan once more and noting vocabulary will help a great deal.';

  area.innerHTML = `
    <div class="result-card">
      <div class="q-meta">Your result</div>
      <div class="result-score">${score} / ${questions.length}</div>
      <div class="result-label">${pct}% correct</div>
      <div class="result-msg">${msg}</div>
      <button class="restart-btn" onclick="restart()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Play again
      </button>
    </div>
  `;
}

function restart() {
  current = 0;
  score = 0;
  answered = [];
  render();
}

render();
</script>
</body>
</html>
